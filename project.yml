name: ComposersNotebook
options:
  bundleIdPrefix: com.timshega
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  ComposersNotebook:
    type: application
    platform: iOS
    sources:
      - ComposersNotebook
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Нужен доступ к микрофону для записи музыкальных идей"
        SWIFT_VERSION: "5"
        SWIFT_STRICT_CONCURRENCY: minimal
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_BUNDLE_IDENTIFIER: com.timshega.composersnotebook
        PRODUCT_NAME: "Composer's Notebook"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_IDENTITY: "-"
        GCC_TREAT_WARNINGS_AS_ERRORS: "NO"
