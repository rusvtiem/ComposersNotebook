name: ComposersNotebook
options:
  bundleIdPrefix: com.timshega
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  ComposersNotebook:
    type: application
    platform: iOS
    sources:
      - ComposersNotebook
    info:
      path: SupportFiles/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - Bravura.otf
        NSMicrophoneUsageDescription: "Нужен доступ к микрофону для записи музыкальных идей"
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Composer's Notebook"
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.timshega.composersnotebook.cnb
          - CFBundleTypeName: MusicXML
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.xml
          - CFBundleTypeName: MIDI
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.midi-audio
        UTExportedTypeDeclarations:
          - UTTypeConformsTo:
              - public.data
              - public.content
            UTTypeDescription: "Composer's Notebook Document"
            UTTypeIdentifier: com.timshega.composersnotebook.cnb
            UTTypeTagSpecification:
              public.filename-extension:
                - cnb
    settings:
      base:
        SWIFT_VERSION: "5"
        SWIFT_STRICT_CONCURRENCY: minimal
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_BUNDLE_IDENTIFIER: com.timshega.composersnotebook
        PRODUCT_NAME: "Composer's Notebook"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_IDENTITY: "Apple Development"
        GCC_TREAT_WARNINGS_AS_ERRORS: "NO"
